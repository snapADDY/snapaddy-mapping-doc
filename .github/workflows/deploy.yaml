name: Release (Production)
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    environment:
      name: Production
      url: https://mapping.snapaddy.com

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::237519622892:role/CI-gha-mapping-doc
          aws-region: eu-central-1

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy
        run: |
          echo "Uploading assets with caching"
          aws s3 sync $SRC_DIR/assets s3://$BUCKET_NAME/assets \
            --delete \
            --no-progress \
            --cache-control 'public, max-age=604800, immutable'

          echo "Uploading other files with no-cache"
          aws s3 sync $SRC_DIR s3://$BUCKET_NAME \
            --delete \
            --no-progress \
            --exclude 'assets/*' \
            --cache-control 'no-cache'

        env:
          SRC_DIR: docs/.vitepress/dist
          BUCKET_NAME: mapping.snapaddy.com
          CLOUDFRONT_DISTRIBUTION_ID: E30PL633FC852FC852F
